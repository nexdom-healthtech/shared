name: 🐞 Relatar um bug
description: Avise sobre um problema
labels: ["bug"]
title: "BUG | `nomeDaFuncionalidade` | "
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pelo seu interesse em nos reportar este problema!

        Por favor, siga um dos formatos de título a seguir:
        - ``BUG | `nomeDaFuncionalidade` | Breve Descrição``

        Por exemplo:
        ```
        BUG | `maskFormatter` | Erro quando a string está vazia
        ```
  - type: textarea
    id: bug-description
    attributes:
      label: Descreva o bug
      description: Uma descrição clara e concisa de qual é o problema. Se há a intenção de implementar a PR para resolver o mesmo em seguida, nos informe aqui. Obrigado!
      placeholder: Descrição do bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reprodução
      description: Por favor, forneça o passo a passo para reprodução do problema.
      placeholder: Reprodução passo a passo
    validations:
      required: true
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Validations
      description: Antes de submeter a issue, por favor certifique-se de fazer o seguinte
      options:
        - label: Ler o [Contributing Guidelines](https://github.com/nexdom-healthtech/pkg-template#contributing).
          required: true
        - label: Ler a [docs](https://nexdom-healthtech.github.io/pkg-template/).
          required: true
        - label: Verificar se já não existe uma [issue](https://github.com/nexdom-healthtech/pkg-template/issues) criada para tratar este tema, evitando duplicidades.
          required: true
        - label: Certifique-se de que o problema está dentro desse projeto e não em um outro framework específico.
          required: true
